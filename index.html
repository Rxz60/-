<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;min-height:100vh;display:flex;justify-content:center;align-items:center;font-family:'Cairo',sans-serif;padding:20px;overflow-x:hidden}
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Fira+Code:wght@400;600&display=swap');
.E1{position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#ff1a1a,#ff4444,#ff1a1a,transparent);box-shadow:0 0 20px #ff1a1a88;pointer-events:none;z-index:1}
.E2{position:fixed;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#ff1a1a,#ff4444,#ff1a1a,transparent);box-shadow:0 0 20px #ff1a1a88;pointer-events:none;z-index:1}
.E3{position:fixed;top:0;bottom:0;left:0;width:3px;background:linear-gradient(180deg,transparent,#ff1a1a,#ff4444,#ff1a1a,transparent);box-shadow:0 0 20px #ff1a1a88;pointer-events:none;z-index:1}
.E4{position:fixed;top:0;bottom:0;right:0;width:3px;background:linear-gradient(180deg,transparent,#ff1a1a,#ff4444,#ff1a1a,transparent);box-shadow:0 0 20px #ff1a1a88;pointer-events:none;z-index:1}
.B{position:relative;z-index:2;width:100%;max-width:800px;background:#111;border:2px solid #2a0a0a;border-radius:24px;padding:30px 25px;box-shadow:0 0 60px #ff000015,inset 0 0 80px #ff000008}
.HD{text-align:center;margin-bottom:25px;padding-bottom:18px;border-bottom:1px solid #2a0a0a}
.HR{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
.HI{font-size:36px;line-height:1;filter:drop-shadow(0 0 12px #ff1a1a)}
.HT{font-size:28px;font-weight:900;color:#ff1a1a;text-shadow:0 0 20px #ff1a1a66,0 0 60px #ff000033;letter-spacing:1px}
.HS{font-size:15px;color:#cc9999;margin-top:5px}
.HE{font-size:12px;color:#664444;font-family:'Fira Code',monospace;margin-top:2px;letter-spacing:2px}
.HX{font-size:20px;margin-top:7px;color:#ff4444}
.UA{background:rgba(80,10,10,0.25);border:2px dashed #ff333355;border-radius:18px;padding:35px 20px;text-align:center;cursor:pointer;transition:all 0.3s;margin-bottom:18px;position:relative}
.UA:hover{background:rgba(120,15,15,0.3);border-color:#ff444488}
.UA.drag{background:rgba(180,20,20,0.25);border-color:#ff6666}
.UI{font-size:48px;display:block;margin-bottom:8px;opacity:0.7}
.UP{color:#cc6666;font-size:22px;font-weight:700}
.UP small{display:block;font-size:13px;font-weight:400;color:#884444;margin-top:5px}
#fI{display:none}
.PV{display:none;margin:0 auto 15px;text-align:center}
.PV.show{display:block}
.PV img{max-width:100%;max-height:200px;border-radius:12px;border:2px solid #ff333355;box-shadow:0 0 30px #ff000015}
.II{display:none;align-items:center;justify-content:space-between;background:#1a0a0a;border:1px solid #3a1a1a;border-radius:12px;padding:10px 16px;margin-bottom:18px}
.II.show{display:flex}
.IL{display:flex;align-items:center;gap:10px}
.IB{width:38px;height:44px;background:#2a0a0a;border:2px solid #ff333366;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px}
.IN{color:#ddbbbb;font-size:13px;font-weight:600;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.IZ{color:#885555;font-size:11px}
.IX{background:none;border:none;color:#884444;cursor:pointer;font-size:16px}
.PB{display:none;height:4px;background:#1a0a0a;border-radius:10px;margin-bottom:15px;overflow:hidden}
.PB.show{display:block}
.PF{height:100%;width:0%;background:linear-gradient(90deg,#ff1a1a,#ff5555,#ff1a1a);background-size:200% 100%;animation:PM 1.2s infinite linear;border-radius:10px;transition:width 0.3s}
@keyframes PM{0%{background-position:200% 0}100%{background-position:-200% 0}}
.EB{display:block;width:100%;padding:15px;background:linear-gradient(135deg,#6b0f0f,#8b1a1a);border:2px solid #ff333355;border-radius:14px;color:#fff;font-size:19px;font-weight:700;font-family:'Cairo',sans-serif;cursor:pointer;transition:all 0.3s;text-shadow:0 0 10px #ff000066;margin-bottom:20px}
.EB:hover{background:linear-gradient(135deg,#8b1a1a,#aa2222);border-color:#ff666688;box-shadow:0 0 30px #ff000033}
.EB:disabled{opacity:0.4;cursor:not-allowed}
.OS{display:none;margin-top:5px}
.OS.show{display:block}
.OL{color:#cc8888;font-size:15px;font-weight:700;margin-bottom:7px;display:flex;align-items:center;gap:5px}
.OL .T{color:#ff1a1a;font-family:'Fira Code',monospace;font-weight:700;font-size:17px}
.OB{background:#0d0606;border:1px solid #3a1515;border-radius:14px;padding:16px 18px;margin-bottom:12px;min-height:70px;max-height:250px;overflow-y:auto;direction:ltr;text-align:left;font-family:'Fira Code',monospace;font-size:12px;line-height:1.6;color:#ffbbbb;word-break:break-all;white-space:pre-wrap}
.OB::-webkit-scrollbar{width:5px}
.OB::-webkit-scrollbar-track{background:#0d0606}
.OB::-webkit-scrollbar-thumb{background:#4a1a1a;border-radius:10px}
.AR{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.CB{display:flex;align-items:center;gap:6px;padding:9px 20px;background:#1a0808;border:1px solid #ff333366;border-radius:50px;color:#ffaaaa;font-size:14px;font-weight:600;font-family:'Cairo',sans-serif;cursor:pointer;transition:all 0.25s}
.CB:hover{background:#2a0a0a;border-color:#ff666688;color:#ffdddd;box-shadow:0 0 20px #ff000022}
.CB.ok{background:#0a2a0a;border-color:#33ff3366;color:#88ff88}
.DT{display:flex;align-items:center;gap:5px;padding:9px 16px;background:#1a0808;border:1px solid #ff333355;border-radius:50px;color:#ffaaaa;font-size:13px;font-weight:600;font-family:'Cairo',sans-serif;cursor:pointer;transition:all 0.25s}
.DT:hover{background:#2a0a0a;border-color:#ff666688;color:#ffdddd;box-shadow:0 0 20px #ff000022}
.FT{margin-top:24px;text-align:center;font-size:11px;color:#442222;border-top:1px solid #1a0a0a;padding-top:14px;font-family:'Fira Code',monospace;letter-spacing:1px}
.FT span{color:#663333}
@media(max-width:600px){.B{padding:18px 12px}.HT{font-size:20px}.HI{font-size:28px}.UP{font-size:18px}.EB{font-size:17px;padding:13px}.OB{font-size:11px;padding:12px;max-height:170px}.CB{font-size:12px;padding:8px 14px}.DT{font-size:11px;padding:8px 12px}.IN{max-width:100px}.UA{padding:25px 15px}}

<body>

<div class="E1"></div>
<div class="E2"></div>
<div class="E3"></div>

<div class="B">

<script>
(function(){
var WM='— تم تشفيرك من قبل تراكس هوب';
var WI='تم تشفيرك من قبل تراكس';
var $=function(i){return document.getElementById(i)};
var UA=$('UA'),FI=$('fI'),PV=$('PV'),IB=$('IB'),IN=$('IN'),IZ=$('IZ');
var II=$('II'),PB=$('PB'),PF=$('PF'),EB=$('EB');
var OS=$('OS'),OB=$('OB'),CB=$('CB'),DT=$('DT');
var CF=null,ER='';

function sz(n){if(n<1024)return n+' B';if(n<1048576)return(n/1024).toFixed(1)+' KB';return(n/1048576).toFixed(1)+' MB'}

function pr(p){PB.classList.add('show');PF.style.width=Math.min(100,p)+'%';if(p>=100)setTimeout(function(){PB.classList.remove('show');PF.style.width='0%'},600)}

function dl(ms){return new Promise(function(r){setTimeout(r,ms)})}

function hf(f){
  if(!f)return;
  CF=f;
  IN.textContent=f.name;
  IZ.textContent=sz(f.size);
  II.classList.add('show');
  if(f.type.startsWith('image/')){
    IB.textContent='🖼️';
    var rd=new FileReader();
    rd.onload=function(e){
      PV.innerHTML='<img src="'+e.target.result+'" alt="preview">';
      PV.classList.add('show');
    };
    rd.readAsDataURL(f);
  }else{
    IB.textContent='📄';
    PV.classList.remove('show');
    PV.innerHTML='';
  }
  EB.disabled=false;
  OS.classList.remove('show');
  ER='';
}

window.X=function(){
  CF=null;FI.value='';II.classList.remove('show');
  PV.classList.remove('show');PV.innerHTML='';
  EB.disabled=true;OS.classList.remove('show');ER='';
};

UA.addEventListener('click',function(){FI.click()});
UA.addEventListener('dragover',function(e){e.preventDefault();UA.classList.add('drag')});
UA.addEventListener('dragleave',function(){UA.classList.remove('drag')});
UA.addEventListener('drop',function(e){
  e.preventDefault();UA.classList.remove('drag');
  if(e.dataTransfer.files.length)hf(e.dataTransfer.files[0]);
});
FI.addEventListener('change',function(){
  if(FI.files.length)hf(FI.files[0]);
});

function hb(d){
  var h=0xTRACE,i=0,l=d.length,m=l<4096?l:4096;
  for(i=0;i<m;i++){h=((h<<7)|(h>>>25))^d[i];h=(h*0x9E3779B9)|0}
  return h>>>0;
}

function mk(h,wb){
  var k=new Uint8Array(64),FX=[0xTR,0xAC,0xE5,0x1D,0xFA,0xCE,0x07,0xBB];
  for(var i=0;i<64;i++){
    var v=((h>>>((i%4)*8))&0xFF)^FX[i%8]^(i*0x37&0xFF);
    if(wb&&wb.length)v^=wb[i%wb.length];
    v=((v<<3)|(v>>>5))&0xFF;k[i]=v;
  }
  return k;
}

function en(d){
  var e=new Uint8Array(d.length);
  for(var i=0;i<d.length;i++)e[i]=d[i];
  var h=hb(d),t2=new TextEncoder(),wb=t2.encode(WM),key=mk(h,wb);
  for(var p=0;p<4;p++){
    var off=p*13+7,tmp=new Uint8Array(e.length);
    for(var i=0;i<e.length;i++){
      var ki=(i+off)%key.length,x=e[i];
      x^=key[ki];x=((x<<3)|(x>>>5))&0xFF;
      x^=key[(ki+5)%key.length];
      if(p>=2){x=((x>>1)|(x<<7))&0xFF;x^=key[(ki+9)%key.length]}
      if(p>=3){x^=(i&0xFF);x=((x<<2)|(x>>6))&0xFF}
      tmp[i]=x;
    }
    e=tmp;
  }
  var scr=new Uint8Array(e.length),idx=[];
  for(var i=0;i<e.length;i++)idx.push(i);
  var sd=h;
  for(var i=idx.length-1;i>0;i--){
    sd=(sd*0x5DEECE66D+0xB)&0xFFFFFFFF;
    var j=(sd>>>16)%(i+1),t=idx[i];idx[i]=idx[j];idx[j]=t;
  }
  for(var i=0;i<e.length;i++)scr[idx[i]]=e[i];
  var bin='';
  for(var i=0;i<scr.length;i++)bin+=String.fromCharCode(scr[i]);
  var b64=btoa(bin);
  var p1=Math.floor(b64.length/3),p2=Math.floor(b64.length*2/3);
  return WM+'\n'+b64.slice(0,p1)+WM+b64.slice(p1,p2)+WM+b64.slice(p2);
}

function de(t){
  if(t.indexOf(WM)<0&&t.indexOf(WI)<0)return{err:'⚠ تم حذف العبارة المائية — التشفير دمر',data:null};
  var cl=t;
  if(cl.indexOf(WM+'\n')===0)cl=cl.slice((WM+'\n').length);
  else if(cl.indexOf(WM)===0)cl=cl.slice(WM.length);
  var i1=cl.indexOf(WM),i2=cl.lastIndexOf(WM),wf='';
  var bc;
  if(i1>=0&&i2>i1){wf=cl.slice(i1,i1+WM.length);bc=cl.slice(0,i1)+cl.slice(i1+WM.length,i2)+cl.slice(i2+WM.length)}
  else if(i1>=0){wf=cl.slice(i1,i1+WM.length);bc=cl.slice(0,i1)+cl.slice(i1+WM.length)}
  else return{err:'⚠ العبارة محذوفة — التشفير تالف',data:null};
  if(wf.indexOf(WI)<0)return{err:'⚠ العبارة معدلة — فك التشفير مستحيل',data:null};
  var bs;
  try{bs=atob(bc)}catch(e){return{err:'⚠ البيانات تالفة',data:null}}
  var scr=new Uint8Array(bs.length);
  for(var i=0;i<bs.length;i++)scr[i]=bs.charCodeAt(i);
  var h2=hb(scr),t2=new TextEncoder(),wb2=t2.encode(wf),key2=mk(h2,wb2);
  var idx2=[];
  for(var i=0;i<scr.length;i++)idx2.push(i);
  var sd2=h2;
  for(var i=idx2.length-1;i>0;i--){
    sd2=(sd2*0x5DEECE66D+0xB)&0xFFFFFFFF;
    var j=(sd2>>>16)%(i+1),t=idx2[i];idx2[i]=idx2[j];idx2[j]=t;
  }
  var unsc=new Uint8Array(scr.length);
  for(var i=0;i<scr.length;i++)unsc[idx2[i]]=scr[i];
  var dec=new Uint8Array(unsc);
  for(var p=3;p>=0;p--){
    var off=p*13+7,tmp=new Uint8Array(dec.length);
    for(var i=0;i<dec.length;i++){
      var ki=(i+off)%key2.length,x=dec[i];
      if(p>=3){x=((x<<6)|(x>>2))&0xFF;x^=(i&0xFF)}
      if(p>=2){x^=key2[(ki+9)%key2.length];x=((x<<1)|(x>>7))&0xFF}
      x^=key2[(ki+5)%key2.length];x=((x<<5)|(x>>3))&0xFF;x^=key2[ki];
      tmp[i]=x;
    }
    dec=tmp;
  }
  return{err:null,data:dec};
}

EB.addEventListener('click',async function(){
  if(!CF)return;
  EB.disabled=true;
  EB.textContent='⚡ جاري التشفير ... ⚡';
  pr(10);
  try{
    var buf=await CF.arrayBuffer();
    pr(30);
    var d=new Uint8Array(buf);
    pr(50);
    await dl(400);
    pr(70);
    var enc=en(d);
    pr(90);
    await dl(300);
    pr(100);
    ER=enc;
    OB.textContent=enc;
    OS.classList.add('show');
  }catch(e){
    OB.textContent='❌ خطأ: '+e.message;
    OS.classList.add('show');
    ER='';
  }finally{
    EB.disabled=false;
    EB.textContent='⚡ شفر الملف — تشفير تراكسي قوي ⚡';
  }
});

CB.addEventListener('click',function(){
  if(!ER)return;
  navigator.clipboard.writeText(ER).then(function(){
    var sp=CB.querySelectorAll('span');
    sp[0].textContent='✅';sp[1].textContent='تم النسخ!';
    CB.classList.add('ok');
    setTimeout(function(){sp[0].textContent='📋';sp[1].textContent='نسخ الكود';CB.classList.remove('ok')},2500);
  }).catch(function(){
    var ta=document.createElement('textarea');
    ta.value=ER;document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);
    var sp=CB.querySelectorAll('span');
    sp[0].textContent='✅';sp[1].textContent='تم النسخ!';
    CB.classList.add('ok');
    setTimeout(function(){sp[0].textContent='📋';sp[1].textContent='نسخ الكود';CB.classList.remove('ok')},2500);
  });
});

DT.addEventListener('click',function(){
  if(!ER)return;
  var bn=CF?CF.name.replace(/\.[^.]+$/,''):'ملف';
  var bl=new Blob([ER],{type:'text/plain;charset=utf-8'});
  var ur=URL.createObjectURL(bl);
  var a=document.createElement('a');
  a.href=ur;a.download=bn+'_مشفرة_TRX.txt';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(ur);
});
})();
</script>
