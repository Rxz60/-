<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>الواجهة الزرقاء الفاخرة | تصميم فاخر</title>
  <style>
    /* ----- إعدادات كونية معقدة لبيئة غامرة ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #010104; /* أسود حالك مع مسحة زرقاء كونية */
      font-family: 'Segoe UI', 'Cairo', 'Courier New', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* طبقة غبار ضوئي غامق جداً */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 30% 40%, #030b1f 0%, #000103 90%);
      z-index: 0;
      pointer-events: none;
    }

    /* ----- الحاوية الفاخرة ذات الحواف الدائرية والإطار المتحرك ----- */
    .luxury-frame {
      position: relative;
      width: min(90vw, 700px);
      height: min(70vh, 550px);
      margin: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      border-radius: 48px;
      backdrop-filter: blur(12px);
      background: rgba(0, 2, 15, 0.65);
      box-shadow: 0 0 80px rgba(0, 20, 70, 0.7), inset 0 0 60px rgba(0, 10, 40, 0.9);
    }

    /* ----- العنصر الأساسي الذي يحمل الستروك الدائري + الزوايا المنحنية ----- */
    .animated-border-box {
      position: absolute;
      inset: 0;
      border-radius: 48px;
      pointer-events: none;
      z-index: 20;
    }

    /* ----- طبقة الوميض المتنقل (الستروك الأزرق الغامق جداً الذي يمشي على الحواف) ----- */
    .border-glow-path {
      position: absolute;
      inset: 0;
      border-radius: 48px;
      overflow: hidden;
    }

    /* العنصر الدوار الذي يرسم الوميض حول الإطار */
    .glow-walker {
      position: absolute;
      top: -6px;
      left: -6px;
      right: -6px;
      bottom: -6px;
      border-radius: 54px;
      background: transparent;
      z-index: 25;
    }

    /* هذا الكائن يقوم برسم الستروك بشكل ديناميكي معقد */
    .glow-walker::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 54px;
      padding: 5px;
      background: conic-gradient(
        from 0deg,
        transparent 0%,
        #020b24 5%,
        #041a4a 15%,
        #06266b 25%,
        #020f38 35%,
        #01071f 45%,
        #000210 55%,
        #03123a 65%,
        #051f5c 75%,
        #020c2a 85%,
        transparent 100%
      );
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite: exclude;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      animation: rotateStroke 8s infinite linear;
      filter: drop-shadow(0 0 12px #001e6e) drop-shadow(0 0 25px #000c3a);
      opacity: 0.9;
    }

    /* ظل إضافي يعطي عمق للوميض */
    .glow-walker::after {
      content: "";
      position: absolute;
      inset: 2px;
      border-radius: 48px;
      background: transparent;
      box-shadow: inset 0 0 35px rgba(0, 30, 100, 0.8), 0 0 45px #000e30;
      z-index: 26;
      animation: pulseDepth 4s infinite alternate;
    }

    /* حركة دوران الستروك الأزرق العميق جداً - لا يختفي أبداً */
    @keyframes rotateStroke {
      0% {
        transform: rotate(0deg);
        filter: drop-shadow(0 0 15px #002277) drop-shadow(0 0 40px #00082e);
      }
      50% {
        filter: drop-shadow(0 0 28px #0033aa) drop-shadow(0 0 55px #000c4a);
      }
      100% {
        transform: rotate(360deg);
        filter: drop-shadow(0 0 15px #002277) drop-shadow(0 0 40px #00082e);
      }
    }

    @keyframes pulseDepth {
      0% {
        box-shadow: inset 0 0 45px rgba(0, 25, 90, 0.9), 0 0 45px #000e30;
      }
      100% {
        box-shadow: inset 0 0 75px rgba(0, 35, 120, 0.95), 0 0 70px #001545;
      }
    }

    /* ----- خط إضافي داخلي شديد التعقيد (ضوء خافت على الحواف) ----- */
    .inner-rim {
      position: absolute;
      inset: 8px;
      border-radius: 40px;
      border: 2px solid rgba(0, 45, 140, 0.25);
      box-shadow: inset 0 0 30px rgba(0, 20, 80, 0.7), 0 0 45px #00061f;
      z-index: 5;
      pointer-events: none;
    }

    /* ----- محتوى الواجهة (شعار فخم ونصوص مبعثرة) ----- */
    .content {
      position: relative;
      z-index: 30;
      text-align: center;
      color: #c0d4ff;
      padding: 25px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      text-shadow: 0 0 18px #00144a;
    }

    .crest {
      font-size: 4.5rem;
      font-weight: 200;
      letter-spacing: 8px;
      color: #1a3b7a;
      filter: drop-shadow(0 0 25px #00236b);
      font-family: 'Cinzel', 'Times New Roman', serif;
      opacity: 0.9;
      text-transform: uppercase;
      margin-bottom: 15px;
      background: linear-gradient(180deg, #274b8f 10%, #04153b 90%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .luxury-text {
      font-size: 1.1rem;
      font-weight: 300;
      color: #2a4480;
      letter-spacing: 10px;
      word-spacing: 14px;
      text-transform: uppercase;
      filter: drop-shadow(0 0 12px #00103f);
      border-top: 1px solid #082664;
      border-bottom: 1px solid #082664;
      padding: 18px 10px;
      background: rgba(0, 5, 30, 0.5);
      backdrop-filter: blur(5px);
      border-radius: 60px;
    }

    /* عناصر برمجية غريبة غير مفهومة (رموز معقدة) */
    .cryptic-symbols {
      display: flex;
      gap: 28px;
      margin-top: 10px;
      font-family: 'Courier New', monospace;
      font-size: 1.5rem;
      color: #001f5c;
      filter: drop-shadow(0 0 9px #000e36);
      opacity: 0.8;
    }

    .symbol {
      transition: all 0.6s ease;
      cursor: default;
      animation: floatSymbol 7s infinite alternate;
    }

    @keyframes floatSymbol {
      0% { transform: translateY(0); color: #0a2352; }
      100% { transform: translateY(-8px); color: #14408b; }
    }

    /* وميض خلفي معقد إضافي */
    .ambient-glow {
      position: absolute;
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, #001c53 0%, transparent 70%);
      border-radius: 50%;
      filter: blur(70px);
      z-index: -1;
      opacity: 0.5;
      animation: moveAmbient 15s infinite alternate ease-in-out;
    }

    @keyframes moveAmbient {
      0% { transform: translate(-20px, -20px) scale(1); }
      100% { transform: translate(30px, 40px) scale(1.4); }
    }
  </style>
</head>
<body>
  <!-- هالة الضوء الزرقاء العميقة في الخلفية -->
  <div class="ambient-glow" style="top: 10%; left: 15%;"></div>
  <div class="ambient-glow" style="bottom: 5%; right: 10%; width: 300px; height: 300px; background: radial-gradient(circle, #00143f 0%, transparent 70%);"></div>

  <div class="luxury-frame">
    <!-- الطبقة الداخلية المزخرفة -->
    <div class="inner-rim"></div>

    <!-- صندوق الحواف الدائرية مع الستروك المتحرك -->
    <div class="animated-border-box">
      <div class="border-glow-path">
        <div class="glow-walker"></div>
      </div>
    </div>

    <!-- المحتوى الفاخر -->
    <div class="content">
      <div class="crest">◈ ASTRAL ◈</div>
      <div class="luxury-text">عَمِيق • أَزَلِيّ • غَامِض</div>
      <div class="cryptic-symbols">
        <span class="symbol">⌬ ⌘ ⌬</span>
        <span class="symbol">⎈ ⍟ ⎈</span>
        <span class="symbol">◉ ⌺ ◉</span>
      </div>
      <div style="margin-top: 25px; font-size: 0.85rem; color: #0a235c; letter-spacing: 9px; filter: drop-shadow(0 0 6px #00071f);">
        ════ 𓆩♛𓆪 ════
      </div>
    </div>
  </div>

  <!-- سكريبت معقد لتأكيد ديناميكية الحواف (بدون اختفاء) -->
  <script>
    (function() {
      // كود متقدم يضمن أن الوميض لا ينقطع ويعزز الأداء
      const walker = document.querySelector('.glow-walker');
      if (walker) {
        // تعزيز الطبقات بشكل ديناميكي
        walker.style.willChange = 'filter, opacity';
        
        // مراقبة الأداء وإعادة تنشيط الأنيميشن إذا توقف (ضمان عدم الاختفاء)
        const observer = new MutationObserver(() => {
          const anim = walker.querySelector('::before');
          // إعادة ضبط animation لو حدث تجميد
          walker.style.animation = 'none';
          walker.offsetHeight; // force reflow
          walker.style.animation = '';
        });

        // بدء مراقبة عميقة
        observer.observe(walker, { attributes: true, attributeFilter: ['style', 'class'] });

        // تأكيد الاستمرارية عبر requestAnimationFrame
        let lastRotate = 0;
        function checkContinuity() {
          const style = getComputedStyle(walker, '::before');
          // التحقق من أن الحركة مستمرة
          if (walker) {
            // إعادة تعيين خفيف لضمان عدم توقف GPU
            if (Math.random() < 0.02) { // نادراً جداً نعيد ضبط لمنع الجمود
              walker.style.filter = `drop-shadow(0 0 ${18 + Math.random()*18}px #002277) drop-shadow(0 0 40px #00082e)`;
            }
          }
          requestAnimationFrame(checkContinuity);
        }
        requestAnimationFrame(checkContinuity);
      }

      // رموز غامضة تتغير بشكل ديناميكي لإبهار المتعلم القوي
      const symbols = document.querySelectorAll('.symbol');
      const crypticSequences = [
        ['⌬ ⌘ ⌬', '⎈ ⍟ ⎈', '◉ ⌺ ◉'],
        ['⍟ ◈ ⍟', '⌬ ⎈ ⌬', '⌘ ⍟ ⌘'],
        ['◈ ⌬ ◈', '⍟ ⌘ ⍟', '⎈ ◉ ⎈']
      ];
      
      let seqIndex = 0;
      setInterval(() => {
        seqIndex = (seqIndex + 1) % crypticSequences.length;
        symbols.forEach((sym, idx) => {
          sym.textContent = crypticSequences[seqIndex][idx];
          sym.style.transition = 'all 1.2s cubic-bezier(0.23, 1, 0.32, 1)';
        });
      }, 4800);

      console.log('%cتصميم فاخر | الأزرق العميق المتجول في الحواف | لا اختفاء',
        'color: #0a2f6c; font-size: 18px; font-weight: bold; text-shadow: 0 0 15px #001a4b;');
      console.log('%cالبرمجيات الغريبة نشطة... المتقدمون فقط يفهمون الكود.',
        'color: #1e3f7a; font-style: italic;');
    })();
  </script>
</body>
</html>
