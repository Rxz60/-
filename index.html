<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Capture & GitHub Uploader</title>
    <style>
        :root {
            --bg: #0b0f19;
            --panel: #131c2e;
            --green: #00ff66;
            --blue: #3b82f6;
            --red: #ff3366;
            --text: #ffffff;
            --muted: #64748b;
            --border: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .section {
            width: 100%;
            max-width: 950px;
            background: var(--panel);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
            margin-bottom: 25px;
        }

        .upload-zone {
            border: 2px dashed var(--blue);
            border-radius: 12px;
            padding: 30px;
            cursor: pointer;
            background: rgba(59, 130, 246, 0.03);
            margin-bottom: 15px;
        }

        #videoInput { display: none; }

        #videoPreview {
            width: 100%;
            max-height: 350px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
            background: #000;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn {
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }

        .btn-capture { background: var(--blue); }
        .btn-upload { background: var(--green); color: #000; display: none; }
        .btn-copy-all { background: #475569; display: none; margin-bottom: 15px; }
        .btn-check { background: var(--red); width: auto; padding: 0 20px; }

        .progress-container {
            margin-top: 20px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #1e293b;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--blue), var(--green));
        }

        #progressText {
            margin-top: 8px;
            font-size: 0.9rem;
            color: var(--muted);
        }

        .gallery-container {
            width: 100%;
            max-width: 950px;
            display: none;
        }

        /* نظام المربعات الكثيرة (Grid) للصور والروابط تحت بعض بترتيب */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
        }

        .capture-card {
            background: #162238;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .capture-card img {
            width: 100%;
            height: auto;
            display: block;
            cursor: pointer;
        }

        .capture-info {
            padding: 12px;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: right;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .image-number { color: var(--green); }
        .image-time { color: var(--muted); }

        .link-input {
            width: 100%;
            padding: 6px;
            background: #1f2937;
            border: 1px solid #4b5563;
            border-radius: 4px;
            color: #9ca3af;
            font-size: 0.8rem;
            text-align: left;
            outline: none;
        }

        .btn-copy-single {
            background: #374151;
            color: white;
            padding: 6px;
            font-size: 0.85rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        .btn-copy-single:hover { background: #4b5563; }

        .input-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .input-group input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #4b5563;
            background: #1f2937;
            color: white;
            outline: none;
            text-align: left;
        }

        #checkerResult {
            margin-top: 15px;
            display: none;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #374151;
            background: #000;
        }

        #checkerResult img {
            width: 100%;
            max-height: 400px;
            object-fit: contain;
            display: block;
            cursor: pointer;
        }

        .viewer-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .viewer-overlay img {
            max-width: 95%;
            max-height: 85%;
            object-fit: contain;
            border-radius: 8px;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--red);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="section">
        <div class="upload-zone" onclick="document.getElementById('videoInput').click()">
            <input type="file" id="videoInput" accept="video/*">
            <video id="videoPreview" controls></video>
        </div>

        <div class="btn-group">
            <button id="captureBtn" class="btn btn-capture" style="display:none;">رصد</button>
            <button id="uploadBtn" class="btn btn-upload">رفع الصور</button>
        </div>

        <div class="progress-container" id="progressContainer">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <p id="progressText"></p>
        </div>
    </div>

    <div class="gallery-container" id="galleryContainer">
        <!-- زر نسخ الكل في الأعلى -->
        <button id="copyAllBtn" class="btn btn-copy-all">نسخ روابط الكل</button>
        <div class="gallery-grid" id="galleryGrid"></div>
    </div>

    <div class="section" style="background: #111827;">
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="رابط الصورة المباشر" dir="ltr">
            <button class="btn btn-check" id="checkBtn">فحص</button>
        </div>
        <div id="checkerResult"></div>
    </div>

    <div class="viewer-overlay" id="viewerOverlay">
        <button class="close-btn" id="closeViewer">X</button>
        <img id="viewerImage" src="" alt="">
    </div>

    <canvas id="hiddenCanvas" style="display:none;"></canvas>

    <script>
        const videoInput = document.getElementById('videoInput');
        const videoPreview = document.getElementById('videoPreview');
        const captureBtn = document.getElementById('captureBtn');
        const uploadBtn = document.getElementById('uploadBtn');
        const copyAllBtn = document.getElementById('copyAllBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const galleryContainer = document.getElementById('galleryContainer');
        const galleryGrid = document.getElementById('galleryGrid');
        const canvas = document.getElementById('hiddenCanvas');
        const ctx = canvas.getContext('2d');
        const viewerOverlay = document.getElementById('viewerOverlay');
        const viewerImage = document.getElementById('viewerImage');
        const closeViewer = document.getElementById('closeViewer');
        const urlInput = document.getElementById('urlInput');
        const checkBtn = document.getElementById('checkBtn');
        const checkerResult = document.getElementById('checkerResult');

        let duration = 0;
        let capturedFrames = []; // مصفوفة لتخزين بيانات الصور مؤقتاً قبل الرفع
        let uploadedLinks = [];

        videoInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                videoPreview.src = URL.createObjectURL(file);
                videoPreview.style.display = 'block';
                captureBtn.style.display = 'block';
                uploadBtn.style.display = 'none';
                copyAllBtn.style.display = 'none';
                galleryGrid.innerHTML = '';
                galleryContainer.style.display = 'none';
                progressContainer.style.display = 'none';
                capturedFrames = [];
                uploadedLinks = [];
                videoPreview.onloadedmetadata = function() { duration = videoPreview.duration; };
            }
        });

        // أولاً: عملية الرصد حبة حبة وتخزين الصور محلياً
        captureBtn.addEventListener('click', async function() {
            if (!duration) return;
            captureBtn.disabled = true;
            progressContainer.style.display = 'block';
            galleryContainer.style.display = 'block';
            galleryGrid.innerHTML = '';
            capturedFrames = [];
            uploadedLinks = [];

            canvas.width = videoPreview.videoWidth;
            canvas.height = videoPreview.videoHeight;

            const step = 0.1; 
            let imgCount = 1;

            for (let time = 0; time <= duration; time += step) {
                videoPreview.currentTime = time;
                await new Promise(r => videoPreview.onseeked = r);

                ctx.drawImage(videoPreview, 0, 0, canvas.width, canvas.height);
                const imgData = canvas.toDataURL('image/jpeg', 0.95);
                const formattedTime = time.toFixed(2).replace('.', ',');

                // حفظ بيانات الإطار الحالي في المصفوفة
                capturedFrames.push({
                    id: imgCount,
                    data: imgData,
                    time: formattedTime,
                    rawTime: time
                });

                // إنشاء المربع وعرض الصورة فوراً مع الرقم
                createCard(imgCount, imgData, formattedTime, "");

                const pct = Math.round((time / duration) * 100);
                progressFill.style.width = pct + '%';
                progressText.innerText = `رصد: ${formattedTime}`;
                imgCount++;
            }
            captureBtn.disabled = false;
            uploadBtn.style.display = 'block'; // تفعيل زر رفع الصور مباشرة جنب رصد
        });

        // ثانياً: عملية الرفع عند الضغط على زر رفع الصور
        uploadBtn.addEventListener('click', async function() {
            if (capturedFrames.length === 0) return;

            // النوافذ المنبثقة لطلب البيانات
            const token = prompt("حط التوكن الخاص بك:");
            if (!token) return;

            const repo = prompt("حط اسم المستودع (مثال: username/repo):");
            if (!repo) return;

            alert("بدأ رفع الصور");
            progressFill.style.width = '0%';
            progressText.innerText = "جاري رفع الصور إلى GitHub...";

            const branch = "main";
            const timestampId = Date.now();
            uploadedLinks = [];

            // المرور على الكروت وتحديثها بالروابط أثناء الرفع بترتيب مصفوفة الـ Grid
            for (let i = 0; i < capturedFrames.length; i++) {
                const frame = capturedFrames[i];
                const cleanBase64 = frame.data.split(',')[1];
                const filename = `snap_${timestampId}_${frame.id}.jpg`;
                const url = `https://api.github.com/repos/${repo}/contents/${filename}`;

                try {
                    const response = await fetch(url, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: `Upload ${filename}`,
                            content: cleanBase64,
                            branch: branch
                        })
                    });

                    if (response.ok) {
                        const rawUrl = `https://raw.githubusercontent.com/${repo}/${branch}/${filename}`;
                        uploadedLinks.push(rawUrl);

                        // تحديث حقل الرابط وزر النسخ داخل المربع المقابل له مباشرة
                        const cardInput = document.getElementById(`link-input-${frame.id}`);
                        if (cardInput) cardInput.value = rawUrl;
                    }
                } catch (e) { console.error(e); }

                // تحديث شريط تقدم الرفع
                const pct = Math.round(((i + 1) / capturedFrames.length) * 100);
                progressFill.style.width = pct + '%';
                progressText.innerText = `جاري الرفع: ${i + 1} من أصل ${capturedFrames.length}`;
            }

            progressText.innerText = "تم الرفع بنجاح!";
            if (uploadedLinks.length > 0) {
                copyAllBtn.style.display = 'block'; // إظهار زر نسخ الكل فوق
            }
        });

        // دالة إنشاء كارد المربع بترتيب متناسق
        function createCard(id, imgData, timeStr, linkStr) {
            const card = document.createElement('div');
            card.className = 'capture-card';

            const img = document.createElement('img');
            img.src = imgData;
            img.onclick = () => { viewerImage.src = imgData; viewerOverlay.style.display = 'flex'; };

            const info = document.createElement('div');
            info.className = 'capture-info';
            
            info.innerHTML = `
                <div class="card-header">
                    <span class="image-number"># ${id}</span>
                    <span class="image-time">⏱️ ${timeStr}</span>
                </div>
                <input type="text" id="link-input-${id}" class="link-input" value="${linkStr}" placeholder="الرابط سيظهر هنا بعد الرفع" readonly>
                <button class="btn-copy-single" onclick="copySingleLink(${id})">نسخ الرابط</button>
            `;

            card.appendChild(img);
            card.appendChild(info);
            galleryGrid.appendChild(card);
        }

        // نسخ رابط مربع منفرد
        window.copySingleLink = function(id) {
            const input = document.getElementById(`link-input-${id}`);
            if (input && input.value) {
                navigator.clipboard.writeText(input.value).then(() => {
                    alert(`تم نسخ رابط الصورة رقم ${id}`);
                });
            }
        };

        // نسخ جميع الروابط دفعة واحدة من الأعلى
        copyAllBtn.addEventListener('click', function() {
            if (uploadedLinks.length === 0) return;
            const linksText = uploadedLinks.join('\n');
            navigator.clipboard.writeText(linksText).then(() => {
                alert('تم نسخ جميع روابط الـ Raw بنجاح!');
            });
        });

        closeViewer.onclick = function() { viewerOverlay.style.display = 'none'; };

        checkBtn.addEventListener('click', function() {
            const url = urlInput.value.trim();
            if(!url) return;

            checkerResult.innerHTML = '';
            checkerResult.style.display = 'block';

            const checkedImg = document.createElement('img');
            checkedImg.src = url;
            
            checkedImg.onload = function() {
                checkerResult.appendChild(checkedImg);
                checkedImg.onclick = () => { viewerImage.src = url; viewerOverlay.style.display = 'flex'; };
            };
            checkedImg.onerror = function() {
                checkerResult.innerHTML = `<p style="padding: 15px; color: var(--red);">Error</p>`;
            };
        });
    </script>
</body>
</html>
